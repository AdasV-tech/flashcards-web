<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>THE BUTTON OF ULTIMATE CHAOS™</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow-x: hidden;
    font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
    background: linear-gradient(270deg, #ff0000, #ff9900, #ffee00, #33ff00, #00fff2, #0033ff, #cc00ff, #ff0000);
    background-size: 1600% 1600%;
    animation: rainbow 8s linear infinite;
    text-align: center;
    user-select: none;
    touch-action: manipulation;
  }
  body.disco { animation-duration: 1.5s; }
  @keyframes rainbow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
  }

  #topbar {
    position: sticky;
    top: env(safe-area-inset-top);
    width: 100%;
    max-width: 480px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    margin-top: 6px;
    background: rgba(0,0,0,0.55);
    border-radius: 20px;
    border: 3px solid #000;
    z-index: 100;
  }
  #scoreWrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.05;
  }
  #scoreLabel {
    font-size: clamp(10px, 3vw, 13px);
    color: #ffe066;
    letter-spacing: 1px;
  }
  #score {
    font-size: clamp(22px, 7vw, 34px);
    font-weight: bold;
    color: #fff700;
    -webkit-text-stroke: 1.5px black;
    text-shadow: 2px 2px 0 #000;
  }
  #score.pop { animation: scorePop 0.35s ease; }
  @keyframes scorePop {
    0% { transform: scale(1); }
    40% { transform: scale(1.5) rotate(-4deg); color:#00ff90; }
    100% { transform: scale(1); }
  }
  #shopBtn {
    font-size: clamp(14px, 4vw, 18px);
    padding: 10px 16px;
    border-radius: 16px;
    border: 3px solid black;
    background: #00e5ff;
    font-weight: bold;
    box-shadow: 0 5px 0 #007a8a;
  }
  #shopBtn:active { transform: translateY(4px); box-shadow: none; }

  h1 {
    color: white;
    -webkit-text-stroke: 2px black;
    font-size: clamp(1.4em, 7vw, 2.4em);
    margin: 14px 0 6px 0;
    animation: wiggle 0.6s infinite alternate;
    text-shadow: 3px 3px 0 #000;
  }
  @keyframes wiggle {
    0% { transform: rotate(-3deg) scale(1); }
    100% { transform: rotate(3deg) scale(1.05); }
  }
  #msg {
    font-size: clamp(1.1em, 4.5vw, 1.6em);
    color: #fff;
    -webkit-text-stroke: 1px black;
    min-height: 46px;
    margin-bottom: 14px;
    padding: 0 8px;
  }
  #chaosBtn {
    font-size: clamp(1.3em, 6vw, 2.2em);
    padding: clamp(20px,6vw,30px) clamp(28px,10vw,55px);
    border-radius: 50px;
    border: 8px solid black;
    background: gold;
    cursor: pointer;
    box-shadow: 0 10px 0 #b8860b;
    font-weight: bold;
    transition: transform 0.1s, background 0.3s;
    animation: pulse 1s infinite;
    max-width: 92vw;
  }
  #chaosBtn.pretty {
    background: linear-gradient(135deg, #ff00cc, #3333ff, #00ffcc);
    background-size: 300% 300%;
    animation: pulse 1s infinite, prettyshift 3s ease infinite;
    box-shadow: 0 0 25px 8px rgba(255,0,255,0.7), 0 10px 0 #560056;
    color: white;
    -webkit-text-stroke: 1px black;
  }
  @keyframes prettyshift {
    0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
  #chaosBtn:active {
    transform: scale(0.9) translateY(10px);
    box-shadow: none;
  }
  #crown { display:none; font-size: 1.3em; }

  .float {
    position: fixed;
    font-size: 34px;
    pointer-events: none;
    top: -50px;
    z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); }
  }
  .trail {
    position: fixed;
    font-size: 22px;
    pointer-events: none;
    z-index: 998;
    animation: trailFade 0.6s forwards;
  }
  @keyframes trailFade {
    to { opacity: 0; transform: translateY(-20px) scale(0.5); }
  }

  #achievements {
    color: white;
    font-size: clamp(0.85em, 3.5vw, 1em);
    margin-top: 10px;
    -webkit-text-stroke: 0.5px black;
    min-height: 20px;
  }

  .shake { animation: screenshake 0.4s; }
  @keyframes screenshake {
    0% { transform: translate(0,0) rotate(0); }
    20% { transform: translate(-12px,8px) rotate(-2deg); }
    40% { transform: translate(12px,-8px) rotate(2deg); }
    60% { transform: translate(-8px,12px) rotate(-1deg); }
    80% { transform: translate(8px,-12px) rotate(1deg); }
    100% { transform: translate(0,0) rotate(0); }
  }
  #flashOverlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: white; opacity: 0; pointer-events: none; z-index: 9999;
  }

  #shopModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  #shopModal.open { display: flex; }
  #shopBox {
    background: #1a1a2e;
    border: 5px solid gold;
    border-radius: 24px;
    width: 100%;
    max-width: 420px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 16px;
    color: white;
  }
  #shopBox h2 {
    margin-top: 0;
    font-size: clamp(1.3em, 5vw, 1.7em);
    color: gold;
    -webkit-text-stroke: 1px black;
  }
  .item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 10px;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .item .info { text-align: left; }
  .item .name { font-size: clamp(0.95em, 3.8vw, 1.1em); font-weight: bold; }
  .item .desc { font-size: clamp(0.75em, 3vw, 0.85em); opacity: 0.75; }
  .item button {
    font-size: clamp(0.8em, 3.4vw, 0.95em);
    padding: 8px 14px;
    border-radius: 12px;
    border: 2px solid black;
    background: #00e676;
    font-weight: bold;
    white-space: nowrap;
  }
  .item button:disabled { background: #555; color: #aaa; }
  .item button.owned { background: gold; color: black; }
  #closeShop {
    margin-top: 6px;
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 3px solid black;
    background: #ff4d6d;
    color: white;
    font-weight: bold;
    font-size: 1em;
  }

  #broadcast {
    position: fixed;
    left: 50%;
    bottom: -300px;
    transform: translateX(-50%);
    width: min(92vw, 420px);
    background: #0d0d0d;
    border: 4px solid gold;
    border-radius: 18px;
    color: white;
    padding: 14px;
    z-index: 3000;
    transition: bottom 0.5s ease;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
  }
  #broadcast.show { bottom: 16px; }
  #broadcast .tag {
    display: inline-block;
    background: red;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 0.75em;
    font-weight: bold;
    margin-bottom: 6px;
  }
  #broadcast .headline {
    font-size: clamp(0.95em, 4vw, 1.15em);
    font-weight: bold;
    margin-bottom: 4px;
  }
  #broadcast .sub {
    font-size: clamp(0.8em, 3.4vw, 0.95em);
    opacity: 0.85;
  }
  #broadcast .closeX {
    position: absolute;
    top: 6px; right: 10px;
    background: none; border: none;
    color: white; font-size: 1.3em;
    cursor: pointer;
  }
  .bar-outer { background: #333; border-radius: 8px; height: 10px; margin-top: 8px; overflow: hidden; }
  .bar-inner { background: linear-gradient(90deg, #00ffa2, #00d4ff); height: 100%; width: 0%; transition: width 0.4s linear; }
</style>
</head>
<body>
<div id="flashOverlay"></div>
<div id="app">

  <div id="topbar">
    <div id="scoreWrap">
      <div id="scoreLabel">CHAOS POINTS</div>
      <div id="score">0</div>
    </div>
    <button id="shopBtn">🛒 SHOP</button>
  </div>

  <h1><span id="crown">👑 </span>🎪 CHAOS BUTTON™ 🎪</h1>
  <div id="msg">Press the button. I dare you.</div>
  <button id="chaosBtn">DO NOT PRESS 🚨</button>
  <div id="achievements"></div>

</div>

<div id="shopModal">
  <div id="shopBox">
    <h2>🛍️ CHAOS SHOP</h2>
    <div id="itemsList"></div>
    <button id="closeShop">CLOSE</button>
  </div>
</div>

<div id="broadcast">
  <button class="closeX" id="broadcastClose">✕</button>
  <div class="tag" id="bTag">BREAKING</div>
  <div class="headline" id="bHead">Headline</div>
  <div class="sub" id="bSub">Sub text</div>
  <div class="bar-outer" id="bBarWrap" style="display:none;">
    <div class="bar-inner" id="bBar"></div>
  </div>
</div>

<script>
const body = document.body;
const btn = document.getElementById('chaosBtn');
const msg = document.getElementById('msg');
const scoreEl = document.getElementById('score');
const ach = document.getElementById('achievements');
const flash = document.getElementById('flashOverlay');
const crown = document.getElementById('crown');

let score = 0;
let clicks = 0;
let multiplier = 1;
let owned = new Set();
let autoClickerTimer = null;

const messages = [
  "You absolute legend, you clicked it.",
  "Congratulations, you now own 3 invisible goats.",
  "A wizard somewhere just sneezed because of you.",
  "The button is judging your life choices.",
  "You have unlocked: mild chaos.",
  "Somewhere, a printer is jamming. You did that.",
  "The button says: 'meh, do it again.'",
  "You just gained +1 imaginary friend.",
  "Scientists are baffled. Click again.",
  "A pigeon outside just gained sentience.",
  "You have been legally declared 12% more chaotic.",
  "This click has been reported to the moon.",
  "Achievement unlocked: Button Toucher.",
  "You feel a disturbance in the snack force.",
  "The universe shrugged. Then clapped.",
  "Your left sock is now missing. Coincidence?",
  "You just made a cat somewhere very confused.",
  "This is fine. Everything is fine. Click again.",
  "Warning: excessive awesomeness detected.",
  "A tiny gremlin high-fived your mouse hand."
];

const emojis = ["🎉","🌈","🔥","💥","🐸","🦄","🍕","👽","🎩","💩","🚀","🐙","🍩","👑","🤡","🪩","🧃","🛸"];
const bgFilters = ["hue-rotate(90deg)","invert(1)","saturate(5)","contrast(2)","grayscale(1)","blur(2px)","sepia(1)","hue-rotate(200deg) saturate(3)",""];
const cursors = ["crosshair","grab","zoom-in","help","not-allowed","wait","cell",""];

function randomFloatEmoji() {
  const el = document.createElement('div');
  el.className = 'float';
  el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  el.style.left = Math.random()*90 + "vw";
  el.style.fontSize = (18 + Math.random()*36) + "px";
  el.style.animationDuration = (1.5 + Math.random()*2) + "s";
  body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
function emojiBurst(n) { for (let i=0;i<n;i++) setTimeout(randomFloatEmoji, i*40); }

function doScreenShake() {
  body.classList.remove('shake');
  void body.offsetWidth;
  body.classList.add('shake');
}
function doFlash() {
  flash.style.transition = 'none';
  flash.style.opacity = '0.8';
  requestAnimationFrame(() => {
    flash.style.transition = 'opacity 0.5s';
    flash.style.opacity = '0';
  });
}
function randomFilter() {
  body.style.filter = bgFilters[Math.floor(Math.random()*bgFilters.length)];
  setTimeout(()=>body.style.filter='', 1000);
}
function randomCursorFx() { body.style.cursor = cursors[Math.floor(Math.random()*cursors.length)]; }
function spinBody() {
  body.style.transition = 'transform 0.8s';
  body.style.transform = 'rotate(' + (Math.random()>0.5?360:-360) + 'deg)';
  setTimeout(() => { body.style.transition='none'; body.style.transform='rotate(0deg)'; }, 850);
}
function growBtn() {
  const scale = 0.7 + Math.random()*1.2;
  btn.style.transform = 'scale(' + scale + ') rotate(' + (Math.random()*30-15) + 'deg)';
  setTimeout(() => { btn.style.transform=''; }, 400);
}
function renameBtn() {
  const names = ["DO NOT PRESS 🚨","PRESS AGAIN 😈","WHY ARE YOU STILL HERE","OK ONE MORE TIME","IT TICKLES","STOP. OR DON'T.","MORE CHAOS PLZ","BUTTON GO BRRR","FINE, AGAIN","🚨 SIREN NOISES 🚨"];
  const label = names[Math.floor(Math.random()*names.length)];
  btn.textContent = owned.has('pretty') ? "✨ " + label + " ✨" : label;
}

const achievementsList = [
  {n: 1, text: "🏅 Achievement: First Click!"},
  {n: 5, text: "🏅 Achievement: Mildly Concerning."},
  {n: 15, text: "🏅 Achievement: Chaos Enthusiast."},
  {n: 30, text: "🏅 Achievement: The Button Fears You."},
  {n: 50, text: "🏅 Achievement: Certified Menace."},
  {n: 100, text: "🏅 Achievement: You Should Touch Grass."}
];
function checkAchievements() {
  const found = achievementsList.find(a => a.n === clicks);
  if (found) {
    ach.textContent = found.text;
    ach.style.animation = 'none';
    void ach.offsetWidth;
    ach.style.animation = 'wiggle 0.4s ease';
  }
}

let audioCtx = null;
function honk() {
  if (!owned.has('honk')) return;
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = 150 + Math.random()*300;
    g.gain.value = 0.08;
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    o.stop(audioCtx.currentTime + 0.25);
  } catch(e) {}
}

function addScore(amount) {
  score += Math.round(amount * multiplier);
  if (score < 0) score = 0;
  scoreEl.textContent = score;
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  refreshShopButtons();
}

const chaosActions = [
  () => doScreenShake(),
  () => emojiBurst(owned.has('confetti') ? 28 : 14),
  () => randomFilter(),
  () => randomCursorFx(),
  () => spinBody(),
  () => doFlash(),
  () => growBtn()
];

btn.addEventListener('click', () => {
  clicks++;
  addScore(Math.floor(Math.random()*10)+1);
  msg.textContent = messages[Math.floor(Math.random()*messages.length)];
  renameBtn();
  honk();

  const shuffled = [...chaosActions].sort(()=>Math.random()-0.5);
  const count = 2 + Math.floor(Math.random()*2);
  for (let i=0;i<count;i++) shuffled[i]();

  checkAchievements();
  maybeTriggerBroadcast();
});

setInterval(() => { if (Math.random() < 0.5) randomFloatEmoji(); }, 1500);

function spawnTrail(x, y) {
  const el = document.createElement('div');
  el.className = 'trail';
  el.textContent = '🐱';
  el.style.left = (x-11) + 'px';
  el.style.top = (y-11) + 'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 650);
}
let lastTrail = 0;
function trailHandler(x, y) {
  if (!owned.has('cat')) return;
  const now = Date.now();
  if (now - lastTrail < 80) return;
  lastTrail = now;
  spawnTrail(x, y);
}
window.addEventListener('mousemove', e => trailHandler(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  if (e.touches[0]) trailHandler(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});

const items = [
  { id:'pretty', name:'✨ Prettier Button', desc:'Glowing gradient chaos button', cost:50,
    apply: () => btn.classList.add('pretty') },
  { id:'disco', name:'🌈 Disco Background', desc:'Faster rainbow strobe mode', cost:80,
    apply: () => body.classList.add('disco') },
  { id:'multi', name:'💰 Point x2 Multiplier', desc:'Double all chaos points earned', cost:150,
    apply: () => { multiplier *= 2; } },
  { id:'confetti', name:'🎊 Confetti Overload', desc:'Way more emoji per click', cost:60,
    apply: () => {} },
  { id:'cat', name:'🐱 Cat Cursor Trail', desc:'A cat follows your finger/mouse', cost:40,
    apply: () => {} },
  { id:'honk', name:'🔊 Honk Sound FX', desc:'Silly honk noise every click', cost:30,
    apply: () => {} },
  { id:'crownItem', name:'👑 Golden Crown', desc:'Wear it proudly on the title', cost:100,
    apply: () => { crown.style.display = 'inline'; } },
  { id:'auto', name:'🤖 Auto Clicker Bot', desc:'Auto-generates points every 2s', cost:200,
    apply: () => {
      if (autoClickerTimer) return;
      autoClickerTimer = setInterval(() => {
        addScore(Math.floor(Math.random()*5)+1);
        msg.textContent = "🤖 the bot clicked for you. lazy human.";
      }, 2000);
    } }
];

const itemsList = document.getElementById('itemsList');
function renderShop() {
  itemsList.innerHTML = '';
  items.forEach(it => {
    const row = document.createElement('div');
    row.className = 'item';
    const isOwned = owned.has(it.id);
    row.innerHTML = `
      <div class="info">
        <div class="name">${it.name}</div>
        <div class="desc">${it.desc}</div>
      </div>
      <button data-id="${it.id}" ${isOwned ? 'class="owned" disabled' : (score < it.cost ? 'disabled' : '')}>
        ${isOwned ? 'OWNED ✅' : '💎 ' + it.cost}
      </button>
    `;
    itemsList.appendChild(row);
  });
  itemsList.querySelectorAll('button').forEach(b => {
    b.addEventListener('click', () => purchase(b.getAttribute('data-id')));
  });
}
function refreshShopButtons() {
  itemsList.querySelectorAll('button').forEach(b => {
    const id = b.getAttribute('data-id');
    if (owned.has(id)) return;
    const it = items.find(i => i.id === id);
    b.disabled = score < it.cost;
    b.textContent = '💎 ' + it.cost;
  });
}
function purchase(id) {
  const it = items.find(i => i.id === id);
  if (!it || owned.has(id) || score < it.cost) return;
  score -= it.cost;
  scoreEl.textContent = score;
  owned.add(id);
  it.apply();
  renderShop();
  msg.textContent = "🛒 Purchased: " + it.name + "!";
}

const shopModal = document.getElementById('shopModal');
document.getElementById('shopBtn').addEventListener('click', () => { renderShop(); shopModal.classList.add('open'); });
document.getElementById('closeShop').addEventListener('click', () => shopModal.classList.remove('open'));
shopModal.addEventListener('click', (e) => { if (e.target === shopModal) shopModal.classList.remove('open'); });

const broadcast = document.getElementById('broadcast');
const bTag = document.getElementById('bTag');
const bHead = document.getElementById('bHead');
const bSub = document.getElementById('bSub');
const bBarWrap = document.getElementById('bBarWrap');
const bBar = document.getElementById('bBar');
let broadcastTimeout = null;

const newsHeadlines = [
  "Local Man Discovers Button, Regrets Nothing",
  "Scientists Confirm: Chaos Points Are 'Basically Currency'",
  "Area Goat Elected Mayor, Approval Rating Skyrockets",
  "Breaking: Wi-Fi Achieves Sentience, Demands Snacks",
  "Study Finds 100% of Buttons Enjoy Being Pressed",
  "Moon Reportedly 'A Little Extra' Tonight",
  "Man Yells at Cloud, Cloud Yells Back"
];
const weatherReports = [
  "☀️ 100% chance of chaos with scattered confetti.",
  "🌧️ Raining cats. Literally. Bring an umbrella.",
  "🌪️ Tornado warning: tornado made entirely of glitter.",
  "❄️ Snowing popcorn. Do not eat off the ground.",
  "🌈 Rainbow detected. Do not attempt to touch it."
];
const mukbangLines = [
  "intense crunching noises... mmm so good 😋",
  "today we're eating an entire invisible sandwich 🥪",
  "chef's kiss on this imaginary ramen 🍜👌",
  "eating 47 tacos in one sitting, wish me luck 🌮",
  "this soup has no flavor but the sound design is immaculate 🍲"
];
const horoscopes = [
  "Mercury is in your snack drawer. Expect chaos.",
  "The stars say: click the button one more time.",
  "Your lucky number today is 'button'.",
  "A great fortune awaits if you press aggressively.",
  "Beware of geese. That is all."
];
const stocksLines = [
  "📈 CHAOS Corp up 420% after button incident.",
  "📉 SnackCo drops 12% amid mukbang shortage.",
  "📈 Rainbow Industries hits all-time high.",
  "📉 Wi-Fi Inc. crashes, literally."
];
const trafficLines = [
  "🚗 Heavy traffic caused by a parade of confused geese.",
  "🚦 All lanes blocked by an enormous inflatable button.",
  "🚧 Road closed due to excessive rainbow buildup."
];

const broadcastTypes = [
  () => ({ tag:'🚨 BREAKING NEWS', head: pick(newsHeadlines), sub:'More at 11. Or never.' }),
  () => ({ tag:'⛅ WEATHER REPORT', head: pick(weatherReports), sub:"Stay indoors. Or don't. We're not your parents." }),
  () => ({ tag:'🍜 MUKBANG LIVE', head: 'Streaming now:', sub: pick(mukbangLines) }),
  () => ({ tag:'🔮 HOROSCOPE', head: pick(horoscopes), sub:'Trust the process.' }),
  () => ({ tag:'📈 MARKET UPDATE', head: pick(stocksLines), sub:'Financial advice not included.' }),
  () => ({ tag:'🚗 TRAFFIC UPDATE', head: pick(trafficLines), sub:'Consider teleportation.' }),
  () => ({ tag:'🧪 SIMULATION', head: 'Simulating the universe...', sub:'', sim:true })
];
function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function showBroadcast(data) {
  bTag.textContent = data.tag;
  bHead.textContent = data.head;
  bSub.textContent = data.sub || '';
  if (data.sim) {
    bBarWrap.style.display = 'block';
    bBar.style.width = '0%';
    let pct = 0;
    const iv = setInterval(() => {
      pct += Math.random()*20;
      if (pct >= 100) { pct = 100; clearInterval(iv); }
      bBar.style.width = pct + '%';
      bSub.textContent = 'Progress: ' + Math.floor(pct) + '% — please remain calm.';
    }, 250);
  } else {
    bBarWrap.style.display = 'none';
  }
  broadcast.classList.add('show');
  clearTimeout(broadcastTimeout);
  broadcastTimeout = setTimeout(() => broadcast.classList.remove('show'), 5000);
}
document.getElementById('broadcastClose').addEventListener('click', () => {
  clearTimeout(broadcastTimeout);
  broadcast.classList.remove('show');
});

function maybeTriggerBroadcast() {
  if (clicks % (3 + Math.floor(Math.random()*4)) === 0) {
    showBroadcast(broadcastTypes[Math.floor(Math.random()*broadcastTypes.length)]());
  }
}
function scheduleIdleBroadcast() {
  const delay = 12000 + Math.random()*13000;
  setTimeout(() => {
    showBroadcast(broadcastTypes[Math.floor(Math.random()*broadcastTypes.length)]());
    scheduleIdleBroadcast();
  }, delay);
}
scheduleIdleBroadcast();

renderShop();
</script>
</body>
