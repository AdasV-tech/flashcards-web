<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Test React</title>
<script data-cfasync="false" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body style="font-family: -apple-system, sans-serif; padding: 30px; font-size: 18px; background: white; color: black;">
<div id="root">Loading React…</div>
<script data-cfasync="false">
  window.addEventListener('error', function (e) {
    document.body.style.background = 'yellow';
    document.getElementById('root').innerText = 'ERROR: ' + (e.message || e);
  });
  document.getElementById('root').innerText = 'Script running, React defined = ' + (typeof React) + ', ReactDOM defined = ' + (typeof ReactDOM);
  try {
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement('div', null, 'REACT RENDERED SUCCESSFULLY')
    );
  } catch (err) {
    document.body.style.background = 'orange';
    document.getElementById('root').innerText = 'RENDER ERROR: ' + err.message;
  }
</script>
</body>
</html>
