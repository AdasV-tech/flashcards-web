    let idSeed = 0;
    function makeId(prefix) {
      idSeed += 1;
      return `${prefix}_${Date.now().toString(36)}_${idSeed}`;
    }

    // ---------- Date helpers (local timezone, YYYY-MM-DD strings) ----------
    function todayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function addDays(dateStr, days) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + days);
      const ny = dt.getFullYear();
      const nm = String(dt.getMonth() + 1).padStart(2, "0");
      const nd = String(dt.getDate()).padStart(2, "0");
      return `${ny}-${nm}-${nd}`;
    }
    function formatDisplayDate(dateStr) {
      if (!dateStr) return "Never";
      const today = todayStr();
      if (dateStr === today) return "Today";
      if (dateStr === addDays(today, -1)) return "Yesterday";
      const [y, m, d] = dateStr.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: y === new Date().getFullYear() ? undefined : "numeric" });
    }
    function formatExpiry(ms) {
      if (!ms) return "";
      const d = new Date(ms);
      return d.toLocaleString(undefined, { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
    }
    function formatDuration(totalSeconds) {
      const s = Math.max(0, Math.floor(totalSeconds || 0));
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m`;
      return `${s}s`;
    }

    // ---------- Credit shop: spend earned time-credits, not money ----------
    // 1 credit = 1 minute of active app use.
    const PREMIUM_PACKAGES = [
      { key: "p1h", label: "1 hour", seconds: 3600, cost: 60 },
      { key: "p24h", label: "24 hours", seconds: 86400, cost: 600 },
      { key: "p7d", label: "7 days", seconds: 604800, cost: 3000 }
    ];
    const PREMIUM_FEATURES = [
      { icon: "🚫", text: "No ads, anywhere in the app" },
      { icon: "🏷️", text: "Organize cards into topics — filter and study by topic" },
      { icon: "🎨", text: "Custom accent color for each deck" },
      { icon: "📋", text: "Bulk-import many cards at once by pasting a list" },
      { icon: "🔀", text: "Shuffle study order instead of the fixed sequence" },
      { icon: "📤", text: "Export any deck to a plain-text file" }
    ];
    const DECK_COLORS = ["#7C6FFF", "#F97316", "#22C55E", "#3B82F6", "#EF4444", "#EAB308", "#EC4899", "#14B8A6"];

    // ---------- Card / deck factories ----------
    function newCard(front, back, today, topic) {
      return {
        id: makeId("card"),
        front,
        back,
        topic: topic || "",
        interval: 1,
        easeFactor: 2.5,
        repetitions: 0,
        nextReviewDate: today,
        lastReviewedDate: null,
        createdDate: today
      };
    }

    // ---------- SM-2 inspired spaced repetition algorithm ----------
    // rating: 1 Again, 2 Hard, 3 Good, 4 Easy, 5 Very Easy
    function applyRating(card, rating, today) {
      let { interval, easeFactor, repetitions } = card;

      if (rating === 1) {
        interval = 1;
        repetitions = 0;
        easeFactor = Math.max(1.3, easeFactor - 0.2);
      } else if (rating === 2) {
        interval = interval * 1.2;
        easeFactor = Math.max(1.3, easeFactor - 0.15);
      } else if (rating === 3) {
        if (repetitions === 0) interval = 1;
        else if (repetitions === 1) interval = 3;
        else interval = interval * easeFactor;
        repetitions += 1;
      } else if (rating === 4) {
        if (repetitions === 0) interval = 4;
        else if (repetitions === 1) interval = 15;
        else interval = interval * easeFactor * 1.3;
        easeFactor = Math.min(2.5, easeFactor + 0.1);
        repetitions += 1;
      } else if (rating === 5) {
        if (repetitions === 0) interval = 7;
        else if (repetitions === 1) interval = 21;
        else interval = interval * easeFactor * 1.6;
        easeFactor = Math.min(2.5, easeFactor + 0.15);
        repetitions += 1;
      }

      easeFactor = Math.round(easeFactor * 100) / 100;
      interval = Math.round(interval * 100) / 100;

      const nextReviewDate = rating === 1 ? today : addDays(today, Math.max(1, Math.round(interval)));

      return { ...card, interval, easeFactor, repetitions, nextReviewDate, lastReviewedDate: today };
    }

    function dueCards(deck, today) {
      return deck.cards.filter(c => c.nextReviewDate <= today);
    }

    function shuffleArray(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ---------- Persistence ----------
    const STORAGE_KEY = "flashcardAppData";

    function loadData() {
      const today = todayStr();
      const fallback = {
        decks: [],
        sessionStats: {
          lastStudyDate: null,
          streak: 0,
          longestStreak: 0,
          totalSessionsCompleted: 0,
          totalCardsReviewed: 0,
          totalActiveSeconds: 0,
          creditSeconds: 0,
          premiumExpiresAt: 0,
          todayLog: { date: today, entries: [] }
        }
      };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return fallback;
        const decks = Array.isArray(parsed.decks) ? parsed.decks : [];
        const stats = parsed.sessionStats && typeof parsed.sessionStats === "object" ? parsed.sessionStats : {};
        let todayLog = stats.todayLog && typeof stats.todayLog === "object" ? stats.todayLog : { date: today, entries: [] };
        if (todayLog.date !== today) todayLog = { date: today, entries: [] };
        return {
          decks: decks.map(dk => ({
            id: dk.id || makeId("deck"),
            name: typeof dk.name === "string" ? dk.name : "Untitled deck",
            color: typeof dk.color === "string" ? dk.color : null,
            createdAt: dk.createdAt || new Date().toISOString(),
            lastStudiedDate: dk.lastStudiedDate || null,
            cards: Array.isArray(dk.cards) ? dk.cards.map(c => ({
              id: c.id || makeId("card"),
              front: typeof c.front === "string" ? c.front : "",
              back: typeof c.back === "string" ? c.back : "",
              topic: typeof c.topic === "string" ? c.topic : "",
              interval: typeof c.interval === "number" ? c.interval : 1,
              easeFactor: typeof c.easeFactor === "number" ? c.easeFactor : 2.5,
              repetitions: typeof c.repetitions === "number" ? c.repetitions : 0,
              nextReviewDate: c.nextReviewDate || today,
              lastReviewedDate: c.lastReviewedDate || null,
              createdDate: c.createdDate || today
            })) : []
          })),
          sessionStats: {
            lastStudyDate: stats.lastStudyDate || null,
            streak: typeof stats.streak === "number" ? stats.streak : 0,
            longestStreak: typeof stats.longestStreak === "number" ? stats.longestStreak : 0,
            totalSessionsCompleted: typeof stats.totalSessionsCompleted === "number" ? stats.totalSessionsCompleted : 0,
            totalCardsReviewed: typeof stats.totalCardsReviewed === "number" ? stats.totalCardsReviewed : 0,
            totalActiveSeconds: typeof stats.totalActiveSeconds === "number" ? stats.totalActiveSeconds : 0,
            creditSeconds: typeof stats.creditSeconds === "number" ? stats.creditSeconds : 0,
            premiumExpiresAt: typeof stats.premiumExpiresAt === "number" ? stats.premiumExpiresAt : 0,
            todayLog
          }
        };
      } catch (err) {
        return fallback;
      }
    }

    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch (err) {
        console.error("Could not save flashcard data", err);
        return false;

    function FlashcardsApp() {

      const pendingSecondsRef = React.useRef(0);
      useEffect(() => {
        if (!loaded) return;
        const flush = () => {
          if (pendingSecondsRef.current <= 0) return;
          const add = pendingSecondsRef.current;
          pendingSecondsRef.current = 0;
          setData(d => ({
            ...d,
            sessionStats: {
              ...d.sessionStats,
              totalActiveSeconds: (d.sessionStats.totalActiveSeconds || 0) + add,
              creditSeconds: (d.sessionStats.creditSeconds || 0) + add
            }
          }));
        };
        const tick = setInterval(() => {
          if (!document.hidden) {
            pendingSecondsRef.current += 1;
            if (pendingSecondsRef.current >= 5) flush();
          }

        document.addEventListener("visibilitychange", onVisibility);

          window.removeEventListener("beforeunload", flush);

          const remainingCredits = Math.floor((d.sessionStats.creditSeconds || 0) / 60);
          if (remainingCredits < cost) return d;
          const now = Date.now();
          const current = d.sessionStats.premiumExpiresAt || 0;
          const base = current > now ? current : now;
          return {
            ...d,
            sessionStats: {

              premiumExpiresAt: base + seconds * 1000
            }

        lines.forEach(line => {

        const due = reviewAll ? pool : dueCards({ cards: pool }, today);

      function rate(rating) {

        const cardIdBeingRated = currentCard.id;

        setData(d => {

            ...dk,

            cards: dk.cards.map(c => c.id === cardIdBeingRated ? applyRating(c, rating, today) : c)
          });

          let { streak, longestStreak, lastStudyDate, totalCardsReviewed, todayLog } = d.sessionStats;
          if (!todayLog || todayLog.date !== today) todayLog = { date: today, entries: [] };
          todayLog = { date: today, entries: [...todayLog.entries, rating] };

          if (lastStudyDate !== today) {

              streak = streak + 1;
            } else {
              streak = 1;
            }
            lastStudyDate = today;
            longestStreak = Math.max(longestStreak, streak);

          totalCardsReviewed = totalCardsReviewed + 1;

      // ---------- Home ----------

          saveError && e("div", { className: "storage-warning" }, "Storage is full or unavailable — your latest changes may not be saved."),
          decks.length > 0 && e("div", { className: "home-stats-row" },
            e("div", { className: "mini-stat" }, e("span", { className: "mini-stat-num" }, totalDueAll), e("span", { className: "mini-stat-label" }, "Due today")),

            e("div", { className: "mini-stat", onClick: () => setView("shop"), style: { cursor: "pointer" } }, e("span", { className: "mini-stat-num" }, credits), e("span", { className: "mini-stat-label" }, "Credits"))
          ),
          decks.length === 0 && e("div", { className: "empty-state" },

                  e("span", null, "· ", formatDisplayDate(deck.lastStudiedDate))

          })),

          !adsRemoved && e(AdBanner, { slot: "1111111111" }),

          premiumActive && e("div", { className: "status-banner" },

              e("button", { className: "btn btn-primary", style: { height: 48 }, onClick: createDeck, disabled: !newDeckName.trim() }, "Create")

      }

      // ---------- Deck detail ----------
      else if (view === "deck" && activeDeck) {
        body = e("div", { className: "deck-detail" },
          editingDeckName ? e("div", { className: "new-deck-form" },
            e("input", {
              className: "text-input", type: "text", autoFocus: true, value: deckNameDraft,
              onChange: ev => setDeckNameDraft(ev.target.value),
              onKeyDown: ev => { if (ev.key === "Enter") saveDeckName(); }

            premiumActive ? e("div", { className: "color-swatch-row" }, DECK_COLORS.map(c => e("button", {

            }))) : e("div", { className: "locked-note", onClick: () => setView("shop") }, "🔒 Custom deck colors are a Premium perk"),
            e("div", { className: "inline-form-actions" },
              e("button", { className: "btn btn-secondary", style: { height: 44 }, onClick: () => setEditingDeckName(false) }, "Cancel"),
              e("button", { className: "btn btn-primary", style: { height: 44 }, onClick: saveDeckName, disabled: !deckNameDraft.trim() }, "Save")

          ) : e("button", { className: "btn-ghost", style: { alignSelf: "flex-start", padding: "0 0 4px" }, onClick: () => { setDeckNameDraft(activeDeck.name); setDeckColorDraft(activeDeck.color); setEditingDeckName(true); } }, "✎ Rename deck"),

            e("div", { className: "mini-stat" }, e("span", { className: "mini-stat-num" }, deckDue), e("span", { className: "mini-stat-label" }, "Due today")),
            e("div", { className: "mini-stat" }, e("span", { className: "mini-stat-num" }, activeDeck.cards.length), e("span", { className: "mini-stat-label" }, "Total cards")),
            e("div", { className: "mini-stat" }, e("span", { className: "mini-stat-num", style: { fontSize: 14 } }, formatDisplayDate(activeDeck.lastStudiedDate)), e("span", { className: "mini-stat-label" }, "Last studied"))
          ),

          deckTopics.length > 0 && (premiumActive ? e("div", { className: "topic-chip-row" },
            e("button", { className: `topic-chip${selectedTopic === "all" ? " active" : ""}`, onClick: () => setSelectedTopic("all") }, "All"),
            deckTopics.map(t => e("button", { key: t, className: `topic-chip${selectedTopic === t ? " active" : ""}`, onClick: () => setSelectedTopic(t) }, t))
          ) : e("div", { className: "locked-note", onClick: () => setView("shop") }, "🔒 Filter by topic with Premium")),

          e("div", { className: "deck-actions" },
            e("button", {
              className: "btn btn-primary", disabled: filteredCards.length === 0,
              onClick: () => startStudy(deckDue > 0 ? false : true)

            e("button", { className: "btn btn-secondary", onClick: openAddCard }, "+ Add card")

          e("div", { className: "shuffle-toggle-row" },
            e("span", null, premiumActive ? "🔀 Shuffle study order" : "🔒 Shuffle study order (Premium)"),
            e("button", {
              className: `switch${shuffleEnabled && premiumActive ? " on" : ""}`,
              onClick: () => premiumActive ? setShuffleEnabled(v => !v) : setView("shop"),
              "aria-label": "Toggle shuffle"
            }, e("span", { className: "switch-knob" }))
          ),

          e("div", { className: "deck-secondary-actions" },
            e("button", { className: "btn btn-secondary", onClick: () => premiumActive ? exportDeck(activeDeck) : setView("shop") }, premiumActive ? "⬇️ Export deck" : "🔒 Export (Premium)")
          ),

          !adsRemoved && e(AdBanner, { slot: "2222222222" }),

          filteredCards.length > 0 && e(React.Fragment, null,
            e("div", { className: "card-list-section-label" }, "Cards"),
            e("div", { className: "deck-list" }, filteredCards.map(c => e("div", { className: "card-row", key: c.id, onClick: () => openEditCard(c) },
              e("div", { className: "card-row-main" },
                e("span", { className: "card-row-text" }, c.front),
                c.topic && e("div", { className: "card-row-topic" }, c.topic)
              ),
              e("span", { className: "card-row-due" }, c.nextReviewDate <= today ? "Due" : formatDisplayDate(c.nextReviewDate)),
              e("button", {
                className: `btn-delete${confirmDeleteCard === c.id ? " confirming" : ""}`,
                onClick: ev => {
                  ev.stopPropagation();
                  if (confirmDeleteCard === c.id) { deleteCard(c.id); }
                  else { setConfirmDeleteCard(c.id); setTimeout(() => setConfirmDeleteCard(curr => curr === c.id ? null : curr), 3000); }
                },
                "aria-label": "Delete card"
              }, confirmDeleteCard === c.id ? "✓" : "×")
            )))
          ),

          e("div", { className: "deck-danger-zone" },
            e("button", {
              className: `btn-text-danger${confirmDeleteDeck ? " confirming" : ""}`,
              onClick: () => {
                if (confirmDeleteDeck) deleteDeck(activeDeck.id);
                else { setConfirmDeleteDeck(true); setTimeout(() => setConfirmDeleteDeck(c => c === true ? false : c), 3000); }
              }
            }, confirmDeleteDeck ? "Tap again to permanently delete deck" : "Delete deck")
          )
        );
      }

      // ---------- Study ----------
      else if (view === "study" && activeDeck && currentCard) {
        body = e(React.Fragment, null,
          e("div", { className: "card-scene", onClick: flip, role: "button", "aria-label": "Flip card" },
            e("div", { className: `card-3d${flipped ? " flipped" : ""}` },
              e("div", { className: "card-face card-front" },
                e("span", { className: "card-label" }, "Question"),
                e("span", { className: "card-text" }, currentCard.front),
                e("span", { className: "card-tap-hint" }, "Tap to reveal answer")
              ),
              e("div", { className: "card-face card-back" },
                e("span", { className: "card-label" }, "Answer"),
                e("span", { className: "card-text" }, currentCard.back)
              )
            )
          ),
          flipped ? e("div", { className: "rating-grid" },
            e("button", { className: "rating-btn rating-again", onClick: () => rate(1) }, e("span", null, "Again"), e("span", { className: "rating-sub" }, "<1d")),
            e("button", { className: "rating-btn rating-hard", onClick: () => rate(2) }, e("span", null, "Hard"), e("span", { className: "rating-sub" }, `${Math.max(1, Math.round(currentCard.interval * 1.2))}d`)),
            e("button", { className: "rating-btn rating-good", onClick: () => rate(3) }, e("span", null, "Good"), e("span", { className: "rating-sub" }, `${currentCard.repetitions === 0 ? 1 : currentCard.repetitions === 1 ? 3 : Math.max(1, Math.round(currentCard.interval * currentCard.easeFactor))}d`)),
            e("button", { className: "rating-btn rating-easy", onClick: () => rate(4) }, e("span", null, "Easy"), e("span", { className: "rating-sub" }, `${currentCard.repetitions === 0 ? 4 : currentCard.repetitions === 1 ? 15 : Math.max(1, Math.round(currentCard.interval * currentCard.easeFactor * 1.3))}d`)),
            e("button", { className: "rating-btn rating-veasy", onClick: () => rate(5) }, e("span", null, "Very Easy"), e("span", { className: "rating-sub" }, `${currentCard.repetitions === 0 ? 7 : currentCard.repetitions === 1 ? 21 : Math.max(1, Math.round(currentCard.interval * currentCard.easeFactor * 1.6))}d`))
          ) : e("div", { className: "reveal-row" },
            e("button", { className: "btn-reveal", onClick: flip }, "Tap to reveal answer")
          ),
          e("div", { className: "bottom-row" },
            e("button", { className: "btn-ghost", onClick: () => { setView("deck"); setFlipped(false); } }, "End session")
          )
        );
      }

      // ---------- Results ----------
      else if (view === "results" && activeDeck) {
        body = e("div", { className: "results" },
          e("div", { className: "results-emoji" }, sessionAccuracy >= 80 ? "🎉" : sessionAccuracy >= 50 ? "👍" : "💪"),
          e("div", { className: "results-title" }, "Session complete"),
          e("div", { className: "results-sub" }, "You reviewed ", sessionEntries.length, " card", sessionEntries.length !== 1 ? "s" : "", " in ", activeDeck.name, "."),
          e("div", { className: "results-stats" },
            e("div", { className: "stat-box" }, e("span", { className: "stat-num" }, sessionEntries.length), e("span", { className: "stat-label" }, "Studied")),
            e("div", { className: "stat-box stat-accuracy" }, e("span", { className: "stat-num" }, `${sessionAccuracy}%`), e("span", { className: "stat-label" }, "Accuracy")),
            e("div", { className: "stat-box stat-streak" }, e("span", { className: "stat-num" }, data.sessionStats.streak), e("span", { className: "stat-label" }, "Day streak"))
          ),
          e("div", { className: "results-actions" },
            dueCards(activeDeck, today).length > 0 && e("button", { className: "btn btn-primary btn-full", onClick: () => startStudy(false) }, "Continue studying"),
            e("button", { className: "btn btn-secondary btn-full", onClick: () => setView("deck") }, "Back to deck"),
            e("button", { className: "btn-ghost", onClick: goHome }, "Home")
          )
        );
      }

      // ---------- Add / Edit card form ----------
      else if (view === "form" && activeDeck) {
        if (bulkMode) {
          const previewCount = bulkText.split("\n").map(l => l.trim()).filter(l => l.includes("|") && l.split("|")[0].trim() && l.split("|")[1] && l.split("|")[1].trim()).length;
          body = e("div", { className: "form-screen" },
            e("div", { className: "field-group" },
              e("div", { className: "field-label" }, "Paste cards — one per line, as Front | Back"),
              e("textarea", { rows: 10, placeholder: "Hola | Hello\nAdiós | Goodbye", value: bulkText, onChange: ev => setBulkText(ev.target.value) })
            ),
            e("div", { className: "btn-study-note" }, `${previewCount} card${previewCount !== 1 ? "s" : ""} will be added`),
            e("button", { className: "btn btn-primary btn-full", onClick: saveBulkImport, disabled: previewCount === 0 }, "Import cards"),
            e("button", { className: "btn-ghost", onClick: () => setBulkMode(false) }, "Back to single card")
          );
        } else {
          body = e("div", { className: "form-screen" },
            e("div", { className: "field-group" },
              e("div", { className: "field-label" }, "Question (front)"),
              e("textarea", { rows: 3, placeholder: "e.g. What is the capital of France?", value: formFront, onChange: ev => setFormFront(ev.target.value) })
            ),
            e("div", { className: "field-group" },
              e("div", { className: "field-label" }, "Answer (back)"),
              e("textarea", { rows: 3, placeholder: "e.g. Paris", value: formBack, onChange: ev => setFormBack(ev.target.value) })
            ),
            premiumActive ? e("div", { className: "field-group" },
              e("div", { className: "field-label" }, "Topic (optional)"),
              e("input", { className: "text-input", type: "text", placeholder: "e.g. Verbs", value: formTopic, onChange: ev => setFormTopic(ev.target.value) })
            ) : e("div", { className: "locked-note", onClick: () => setView("shop") }, "🔒 Add topics to cards with Premium"),
            e("button", { className: "btn btn-primary btn-full", onClick: () => saveCardForm(false), disabled: !formFront.trim() || !formBack.trim() }, editingCardId ? "Save changes" : "Add card"),
            !editingCardId && e("button", { className: "btn btn-secondary btn-full", onClick: () => saveCardForm(true), disabled: !formFront.trim() || !formBack.trim() }, "Add & create another"),
            !editingCardId && e("button", {
              className: "btn-ghost",
              onClick: () => premiumActive ? setBulkMode(true) : setView("shop")
            }, premiumActive ? "📋 Bulk import instead" : "🔒 Bulk import (Premium)"),
            e("button", { className: "btn-ghost", onClick: () => { setEditingCardId(null); setView(returnView); } }, "Cancel")
          );
        }
      }

      // ---------- Stats page ----------
      else if (view === "stats") {
        body = e("div", { className: "stats-page" },
          e("div", { className: "stats-section-title" }, "Today"),
          e("div", { className: "stats-grid" },
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, reviewedToday), e("span", { className: "stats-card-label" }, "Cards reviewed")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, newCompletedToday), e("span", { className: "stats-card-label" }, "New cards completed")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, todayAccuracy === null ? "—" : `${todayAccuracy}%`), e("span", { className: "stats-card-label" }, "Accuracy today")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, data.sessionStats.streak), e("span", { className: "stats-card-label" }, "Current streak"))
          ),
          e("div", { className: "stats-section-title" }, "All time"),
          e("div", { className: "stats-grid" },
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, data.sessionStats.longestStreak), e("span", { className: "stats-card-label" }, "Longest streak")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, data.sessionStats.totalSessionsCompleted), e("span", { className: "stats-card-label" }, "Sessions completed")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, data.sessionStats.totalCardsReviewed), e("span", { className: "stats-card-label" }, "Total reviews")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num" }, totalUniqueCards), e("span", { className: "stats-card-label" }, "Total cards")),
            e("div", { className: "stats-card" }, e("span", { className: "stats-card-num", style: { fontSize: 20 } }, formatDuration(totalActiveSeconds)), e("span", { className: "stats-card-label" }, "Time in app"))
          ),
          decks.length > 0 && e(React.Fragment, null,
            e("div", { className: "stats-section-title" }, "By deck"),
            e("div", { className: "deck-list" }, decks.map(dk => {
              const ease = dk.cards.length > 0 ? (dk.cards.reduce((s, c) => s + c.easeFactor, 0) / dk.cards.length).toFixed(2) : "—";
              return e("div", { className: "deck-stat-row", key: dk.id },
                e("span", { className: "deck-stat-name" }, dk.name),
                e("span", { className: "deck-stat-ease" }, "avg ease ", ease)
              );
            }))
          )
        );
      }

      // ---------- Credits shop ----------
      else if (view === "shop") {
        body = e("div", { className: "shop-page" },
          e("div", { className: "shop-balance" },
            e("span", { className: "shop-balance-num" }, credits),
            e("span", { className: "shop-balance-label" }, "credits available — earned 1 per minute of app use")
          ),
          premiumActive && e("div", { className: "status-banner" },
            e("span", null, "⭐ Premium active"),
            e("span", { className: "status-banner-sub" }, `Until ${formatExpiry(premiumExpiresAt)}`)
          ),

          e("div", { className: "stats-section-title" }, "Premium unlocks"),
          e("div", { className: "feature-list" }, PREMIUM_FEATURES.map((f, i) => e("div", { className: "feature-row", key: i },
            e("span", { className: "feature-row-icon" }, f.icon),
            e("span", null, f.text)
          ))),

          e("div", { className: "stats-section-title" }, "Buy Premium time"),
          e("div", { className: "deck-list" }, PREMIUM_PACKAGES.map(pkg => e("div", { className: "shop-pkg-row", key: pkg.key },
            e("div", { className: "shop-pkg-main" },
              e("span", { className: "shop-pkg-label" }, pkg.label),
              e("span", { className: "shop-pkg-cost" }, `${pkg.cost} credits`)
            ),
            e("button", {
              className: "btn btn-secondary",
              style: { flex: "none", height: 40, padding: "0 18px" },
              disabled: credits < pkg.cost,
              onClick: () => purchasePremium(pkg.seconds, pkg.cost)
            }, credits < pkg.cost ? "Need more" : "Buy")
          ))),

          e("div", { className: "shop-note" }, "Decks are always free and unlimited. Premium is optional and paid only in credits earned by using the app — never money.")
        );
      }

      return e(React.Fragment, null,
        e("style", null, styles),
        e("div", { className: "app" }, header, progressBar, body)
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FlashcardsApp));
  } catch (err) {
    var el = document.getElementById('boot-status');
    el.style.color = 'red';
    el.innerText = 'RUNTIME ERROR: ' + err.message;
  }
})();
</script>
</body>
