<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Flashcards</title>
<script data-cfasync="false" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script data-cfasync="false" src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root">
  <div id="boot-status" style="font-family: -apple-system, sans-serif; color:#111; background:#fff; padding:20px; font-size:14px; line-height:1.5;">
    Loading scripts…
  </div>
</div>
<script data-cfasync="false">
  window.addEventListener('error', function (e) {
    var el = document.getElementById('boot-status');
    if (el) {
      el.style.color = 'red';
      el.innerText = 'JS ERROR: ' + (e.message || e) + '\n' + (e.filename || '') + ':' + (e.lineno || '');
    }
  });
</script>
<script type="text/babel" data-presets="react" data-cfasync="false">
document.getElementById('boot-status').innerText = 'Babel script running…';
const { useState, useEffect } = React;

let idSeed = 0;
function makeId(prefix) {
  idSeed += 1;
  return `${prefix}_${Date.now().toString(36)}_${idSeed}`;
}

const styles = `
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0B0B14;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    color: #F0F0F8;
  }

  button, input, textarea { font-family: inherit; }

  button:focus-visible, textarea:focus-visible, input:focus-visible {
    outline: 2px solid #7C6FFF;
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .app {
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    padding-bottom: 32px;
  }

  .loading-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6B6B8A;
    font-size: 14px;
    font-weight: 600;
  }

  /* Header */
  .header {
    padding: 52px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 0;
  }

  .btn-back {
    background: none;
    border: none;
    color: #F0F0F8;
    font-size: 24px;
    font-weight: 600;
    line-height: 1;
    padding: 4px 6px 4px 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 17px;
    font-weight: 700;
    color: #F0F0F8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .header-count {
    font-size: 13px;
    font-weight: 600;
    color: #6B6B8A;
    flex-shrink: 0;
  }

  /* Progress bar */
  .progress-bar-track {
    height: 3px;
    background: #1C1C2E;
    border-radius: 99px;
    margin-bottom: 36px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #7C6FFF, #BF7FFF);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  /* Home screen / deck list */
  .home-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding-top: 4px;
  }

  .deck-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    overflow-y: auto;
  }

  .deck-row {
    background: #1C1C2E;
    border: 1px solid #2A2A40;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s;
  }
  .deck-row:active { border-color: #7C6FFF; }

  .deck-row-main { min-width: 0; }

  .deck-row-name {
    font-size: 16px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .deck-row-meta {
    font-size: 13px;
    color: #6B6B8A;
    margin-top: 3px;
  }

  .new-deck-form {
    background: #1C1C2E;
    border: 1px solid #2A2A40;
    border-radius: 14px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .text-input {
    background: #14141F;
    border: 1px solid #2A2A40;
    border-radius: 10px;
    padding: 12px 14px;
    color: #F0F0F8;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .text-input:focus { border-color: #7C6FFF; }
  .text-input::placeholder { color: #3A3A55; }

  .new-deck-actions {
    display: flex;
    gap: 10px;
  }

  .btn-new-deck {
    width: 100%;
    height: 52px;
    border-radius: 14px;
    background: transparent;
    border: 1.5px dashed #3A3A55;
    color: #9B93FF;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-new-deck:active { border-color: #7C6FFF; color: #BF7FFF; }

  /* Card flip */
  .card-scene {
    perspective: 900px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card-3d {
    width: 100%;
    max-width: 340px;
    height: 240px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-3d.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
  }

  .card-front {
    background: #1C1C2E;
    border: 1px solid #2A2A40;
  }

  .card-back {
    background: linear-gradient(145deg, #5B4FD8, #8B5CF6);
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .card-text {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    color: #F0F0F8;
  }

  .card-back .card-text {
    color: #fff;
  }

  .card-tap-hint {
    margin-top: 16px;
    font-size: 12px;
    opacity: 0.4;
    font-weight: 500;
  }

  /* Action buttons */
  .actions {
    display: flex;
    gap: 14px;
    margin-bottom: 28px;
  }

  .btn {
    flex: 1;
    height: 56px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn:active { opacity: 0.75; transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .btn-skip {
    background: #1C1C2E;
    color: #6B6B8A;
    border: 1px solid #2A2A40;
  }

  .btn-known {
    background: #10B981;
    color: #fff;
  }

  .btn-unknown {
    background: #1C1C2E;
    color: #F87171;
    border: 1px solid #2A2A40;
  }

  .btn-next {
    background: linear-gradient(135deg, #7C6FFF, #BF7FFF);
    color: #fff;
  }

  /* Bottom row */
  .bottom-row {
    display: flex;
    justify-content: center;
    gap: 20px;
  }

  .btn-ghost {
    background: none;
    border: none;
    color: #6B6B8A;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
  }

  /* Results screen */
  .results {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 24px;
    padding-top: 20px;
  }

  .results-emoji {
    font-size: 64px;
    line-height: 1;
  }

  .results-title {
    font-size: 26px;
    font-weight: 700;
  }

  .results-sub {
    font-size: 15px;
    color: #6B6B8A;
    line-height: 1.5;
  }

  .results-stats {
    display: flex;
    gap: 20px;
  }

  .stat-box {
    background: #1C1C2E;
    border-radius: 16px;
    padding: 20px 28px;
    min-width: 120px;
    border: 1px solid #2A2A40;
  }

  .stat-num {
    font-size: 32px;
    font-weight: 700;
    display: block;
  }

  .stat-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6B6B8A;
    margin-top: 4px;
    display: block;
  }

  .stat-known .stat-num { color: #10B981; }
  .stat-unknown .stat-num { color: #F87171; }

  .btn-restart {
    width: 100%;
    max-width: 280px;
    height: 56px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #7C6FFF, #BF7FFF);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-restart:active { opacity: 0.75; transform: scale(0.97); }

  .add-screen .btn-restart {
    max-width: none;
    margin: 0;
  }

  /* Add card screen */
  .add-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding-top: 8px;
    gap: 16px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6B6B8A;
    margin-bottom: 8px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
  }

  textarea {
    background: #1C1C2E;
    border: 1px solid #2A2A40;
    border-radius: 12px;
    padding: 14px 16px;
    color: #F0F0F8;
    font-size: 16px;
    resize: none;
    outline: none;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: #7C6FFF; }
  textarea::placeholder { color: #3A3A55; }

  .deck-item {
    background: #1C1C2E;
    border: 1px solid #2A2A40;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .deck-item-text {
    font-size: 14px;
    color: #B0B0CC;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-delete {
    background: none;
    border: none;
    color: #F87171;
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
    line-height: 1;
  }

  .btn-delete.confirming {
    background: #F87171;
    color: #fff;
  }
`;

function FlashcardsApp() {
  const [decks, setDecks] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [activeDeckId, setActiveDeckId] = useState(null);
  const [view, setView] = useState("home"); // home | study | add | results
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [front, setFront] = useState("");
  const [back, setBack] = useState("");
  const [showNewDeck, setShowNewDeck] = useState(false);
  const [newDeckName, setNewDeckName] = useState("");
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);

  // Load saved decks once on mount
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const raw = localStorage.getItem("flashcards:decks");
        if (!cancelled && raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed)) setDecks(parsed);
        }
      } catch (err) {
        // nothing saved yet — start fresh
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // Persist decks whenever they change
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      try {
        localStorage.setItem("flashcards:decks", JSON.stringify(decks));
      } catch (err) {
        console.error("Could not save decks", err);
      }
    })();
  }, [decks, loaded]);

  const activeDeck = decks.find(d => d.id === activeDeckId) || null;
  const cards = activeDeck ? activeDeck.cards : [];
  const current = cards[index];
  const known = cards.filter(c => c.known === true).length;
  const unknown = cards.filter(c => c.known === false).length;
  const progress = cards.length > 0 ? index / cards.length : 0;

  function goHome() {
    setView("home");
    setActiveDeckId(null);
    setFlipped(false);
    setConfirmDeleteId(null);
  }

  function openDeck(deck) {
    setActiveDeckId(deck.id);
    setIndex(0);
    setFlipped(false);
    setFront("");
    setBack("");
    setView(deck.cards.length === 0 ? "add" : "study");
  }

  function createDeck() {
    const name = newDeckName.trim();
    if (!name) return;
    const deck = { id: makeId("deck"), name, cards: [] };
    setDecks(d => [...d, deck]);
    setNewDeckName("");
    setShowNewDeck(false);
    openDeck(deck);
  }

  function handleDeleteDeckTap(deck) {
    if (confirmDeleteId === deck.id) {
      setDecks(d => d.filter(x => x.id !== deck.id));
      if (activeDeckId === deck.id) goHome();
      setConfirmDeleteId(null);
    } else {
      setConfirmDeleteId(deck.id);
      setTimeout(() => {
        setConfirmDeleteId(curr => (curr === deck.id ? null : curr));
      }, 3000);
    }
  }

  function flip() { setFlipped(f => !f); }

  function advance() {
    setFlipped(false);
    const isLast = index + 1 >= cards.length;
    setTimeout(() => {
      if (isLast) {
        setView("results");
      } else {
        setIndex(i => i + 1);
      }
    }, 100);
  }

  function mark(val) {
    setDecks(d => d.map(dk => dk.id !== activeDeckId ? dk : {
      ...dk,
      cards: dk.cards.map((c, i) => i === index ? { ...c, known: val } : c)
    }));
    advance();
  }

  function skip() { advance(); }

  function restart() {
    setDecks(d => d.map(dk => dk.id !== activeDeckId ? dk : {
      ...dk,
      cards: dk.cards.map(c => ({ ...c, known: null }))
    }));
    setIndex(0);
    setFlipped(false);
    setView("study");
  }

  function addCard() {
    const f = front.trim(), b = back.trim();
    if (!f || !b) return;
    setDecks(d => d.map(dk => dk.id !== activeDeckId ? dk : {
      ...dk,
      cards: [...dk.cards, { id: makeId("card"), front: f, back: b, known: null }]
    }));
    setFront("");
    setBack("");
  }

  function deleteCard(cardId) {
    setDecks(d => d.map(dk => dk.id !== activeDeckId ? dk : {
      ...dk,
      cards: dk.cards.filter(c => c.id !== cardId)
    }));
  }

  if (!loaded) {
    return (
      <>
        <style>{styles}</style>
        <div className="app">
          <div className="loading-screen">Loading your decks…</div>
        </div>
      </>
    );
  }

  return (
    <>
      <style>{styles}</style>
      <div className="app">
        {/* Header */}
        <div className="header">
          <div className="header-left">
            {view !== "home" && (
              <button className="btn-back" onClick={goHome} aria-label="Back to decks">‹</button>
            )}
            <span className="header-title">
              {view === "home" ? "My Decks" : (activeDeck ? activeDeck.name : "")}
            </span>
          </div>
          <span className="header-count">
            {view === "home" && `${decks.length} deck${decks.length !== 1 ? "s" : ""}`}
            {view === "study" && cards.length > 0 && `${index + 1} / ${cards.length}`}
            {view === "add" && `${cards.length} card${cards.length !== 1 ? "s" : ""}`}
          </span>
        </div>

        {/* Progress */}
        {view === "study" && cards.length > 0 && (
          <div className="progress-bar-track">
            <div className="progress-bar-fill" style={{ width: `${progress * 100}%` }} />
          </div>
        )}

        {/* Home view: deck list */}
        {view === "home" && (
          <div className="home-screen">
            {decks.length === 0 && (
              <div className="results">
                <div className="results-emoji">🗂️</div>
                <div className="results-title">Create your first deck</div>
                <div className="results-sub">Decks keep topics separate — like "Spanish Verbs" or "Biology Ch. 3".</div>
              </div>
            )}

            {decks.length > 0 && (
              <div className="deck-list">
                {decks.map(deck => (
                  <div className="deck-row" key={deck.id} onClick={() => openDeck(deck)}>
                    <div className="deck-row-main">
                      <div className="deck-row-name">{deck.name}</div>
                      <div className="deck-row-meta">{deck.cards.length} card{deck.cards.length !== 1 ? "s" : ""}</div>
                    </div>
                    <button
                      className={`btn-delete${confirmDeleteId === deck.id ? " confirming" : ""}`}
                      onClick={(e) => { e.stopPropagation(); handleDeleteDeckTap(deck); }}
                      aria-label={confirmDeleteId === deck.id ? `Confirm delete ${deck.name}` : `Delete ${deck.name}`}
                    >
                      {confirmDeleteId === deck.id ? "✓" : "×"}
                    </button>
                  </div>
                ))}
              </div>
            )}

            {showNewDeck ? (
              <div className="new-deck-form">
                <div className="field-label">Deck name</div>
                <input
                  className="text-input"
                  type="text"
                  autoFocus
                  placeholder="e.g. Spanish Verbs"
                  value={newDeckName}
                  onChange={e => setNewDeckName(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") createDeck(); }}
                />
                <div className="new-deck-actions">
                  <button className="btn btn-skip" style={{ height: 48 }} onClick={() => { setShowNewDeck(false); setNewDeckName(""); }}>Cancel</button>
                  <button className="btn btn-next" style={{ height: 48 }} onClick={createDeck} disabled={!newDeckName.trim()}>Create</button>
                </div>
              </div>
            ) : (
              <button className="btn-new-deck" onClick={() => setShowNewDeck(true)}>+ New deck</button>
            )}
          </div>
        )}

        {/* Study view */}
        {view === "study" && activeDeck && cards.length > 0 && current && (
          <>
            <div className="card-scene" onClick={flip} role="button" aria-label="Flip card">
              <div className={`card-3d${flipped ? " flipped" : ""}`}>
                <div className="card-face card-front">
                  <span className="card-label">Question</span>
                  <span className="card-text">{current.front}</span>
                  <span className="card-tap-hint">Tap to reveal</span>
                </div>
                <div className="card-face card-back">
                  <span className="card-label">Answer</span>
                  <span className="card-text">{current.back}</span>
                </div>
              </div>
            </div>

            {flipped ? (
              <div className="actions">
                <button className="btn btn-unknown" onClick={() => mark(false)}>✕ Still learning</button>
                <button className="btn btn-known" onClick={() => mark(true)}>✓ Got it</button>
              </div>
            ) : (
              <div className="actions">
                <button className="btn btn-skip" onClick={skip}>Skip →</button>
                <button className="btn btn-next" onClick={flip}>Reveal answer</button>
              </div>
            )}

            <div className="bottom-row">
              <button className="btn-ghost" onClick={() => setView("add")}>Manage deck</button>
              <button className="btn-ghost" onClick={restart}>Restart</button>
            </div>
          </>
        )}

        {/* Results view */}
        {view === "results" && activeDeck && (
          <div className="results">
            <div className="results-emoji">{known >= cards.length * 0.8 ? "🎉" : known >= cards.length * 0.5 ? "👍" : "💪"}</div>
            <div className="results-title">
              {known >= cards.length * 0.8 ? "Great work!" : known >= cards.length * 0.5 ? "Good effort!" : "Keep practising!"}
            </div>
            <div className="results-sub">You got through all {cards.length} cards in {activeDeck.name}.</div>
            <div className="results-stats">
              <div className="stat-box stat-known">
                <span className="stat-num">{known}</span>
                <span className="stat-label">Known</span>
              </div>
              <div className="stat-box stat-unknown">
                <span className="stat-num">{unknown}</span>
                <span className="stat-label">Learning</span>
              </div>
            </div>
            <button className="btn-restart" onClick={restart}>Study again</button>
            <button className="btn-ghost" onClick={() => setView("add")}>Manage deck</button>
          </div>
        )}

        {/* Add / manage cards view */}
        {view === "add" && activeDeck && (
          <div className="add-screen">
            <div className="field-group">
              <div className="field-label">Question (front)</div>
              <textarea
                rows={3}
                placeholder="e.g. What is the capital of France?"
                value={front}
                onChange={e => setFront(e.target.value)}
              />
            </div>

            <div className="field-group">
              <div className="field-label">Answer (back)</div>
              <textarea
                rows={3}
                placeholder="e.g. Paris"
                value={back}
                onChange={e => setBack(e.target.value)}
              />
            </div>

            <button className="btn btn-next" style={{ height: 48 }} onClick={addCard} disabled={!front.trim() || !back.trim()}>
              Add card
            </button>

            {cards.length > 0 && (
              <button className="btn-restart" onClick={() => openDeck(activeDeck)}>Study this deck →</button>
            )}

            {cards.length > 0 && (
              <>
                <div className="field-label" style={{ marginTop: 8 }}>Cards in this deck</div>
                <div className="deck-list">
                  {cards.map(c => (
                    <div className="deck-item" key={c.id}>
                      <span className="deck-item-text">{c.front}</span>
                      <button className="btn-delete" onClick={() => deleteCard(c.id)} aria-label="Delete card">×</button>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<FlashcardsApp />);
} catch (err) {
  document.getElementById('boot-status').style.color = 'red';
  document.getElementById('boot-status').innerText = 'RENDER ERROR: ' + err.message;
}
</script>
</body>
</html>
